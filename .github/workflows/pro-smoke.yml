name: Pro Supabase Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pro-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VEDA_HMAC_KEY: ${{ secrets.VEDA_HMAC_KEY }}
          VEDA_LICENSE_SECRET: ${{ secrets.VEDA_LICENSE_SECRET }}
        run: |
          test -n "$SUPABASE_URL" || (echo "SUPABASE_URL missing" && exit 1)
          test -n "$SUPABASE_SERVICE_KEY" || (echo "SUPABASE_SERVICE_KEY missing" && exit 1)
          test -n "$VEDA_HMAC_KEY" || (echo "VEDA_HMAC_KEY missing" && exit 1)
          test -n "$VEDA_LICENSE_SECRET" || (echo "VEDA_LICENSE_SECRET missing" && exit 1)

      - name: Run Pro Supabase Smoke Test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VEDA_HMAC_KEY: ${{ secrets.VEDA_HMAC_KEY }}
          VEDA_LICENSE_SECRET: ${{ secrets.VEDA_LICENSE_SECRET }}
        run: npm run pro:verify